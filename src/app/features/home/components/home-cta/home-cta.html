<section class="cta" aria-labelledby="cta-title">
  <div class="container">
    <div class="cta__card">
      <!-- Resplandor decorativo -->
      <div class="cta__glow" aria-hidden="true"></div>

      <h2 id="cta-title" class="cta__title">
        Planificá tu próximo viaje con más información
      </h2>
      <p class="cta__desc">
        Creá una cuenta y preparate para guardar las ciudades que te interesan.
      </p>

      <div class="cta__actions">
        <a routerLink="/registro" class="btn btn--primary btn--lg">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
               width="16" height="16" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
          Crear una cuenta
        </a>
        <a routerLink="/buscar" class="btn btn--secondary btn--lg">
          Buscar ciudades
        </a>
      </div>
    </div>
  </div>
</section>
