<section class="how" aria-labelledby="how-title">
  <div class="container">

    <div class="section-header">
      <span class="section-label">Cómo funciona</span>
      <h2 id="how-title">Empezá en tres pasos simples</h2>
    </div>

    <div class="how__steps">
      <!-- Línea decorativa (solo escritorio) -->
      <div class="how__connector" aria-hidden="true"></div>

      <!-- Paso 1 -->
      <div class="how__step">
        <div class="how__step-icon-wrap">
          <span class="how__step-num" aria-label="Paso 1">01</span>
          <span class="how__step-icon" aria-hidden="true">
            <!-- Lupa -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
                 width="22" height="22">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.3-4.3"/>
            </svg>
          </span>
        </div>
        <h3 class="how__step-title">Buscá tu destino</h3>
        <p class="how__step-desc">
          Escribí el nombre de una ciudad y seleccioná un resultado.
        </p>
      </div>

      <!-- Paso 2 -->
      <div class="how__step">
        <div class="how__step-icon-wrap">
          <span class="how__step-num" aria-label="Paso 2">02</span>
          <span class="how__step-icon" aria-hidden="true">
            <!-- Sol con nube -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
                 width="22" height="22">
              <path d="M12 2v2M4.93 4.93l1.41 1.41M20 12h2m-2.93-7.07-1.41 1.41"/>
              <path d="M15.947 12.65a4 4 0 0 0-5.925-4.128"/>
              <path d="M13 22H7a5 5 0 1 1 4.9-6H13a3 3 0 0 1 0 6z"/>
            </svg>
          </span>
        </div>
        <h3 class="how__step-title">Consultá el pronóstico</h3>
        <p class="how__step-desc">
          Revisá las condiciones actuales y la previsión disponible.
        </p>
      </div>

      <!-- Paso 3 -->
      <div class="how__step">
        <div class="how__step-icon-wrap">
          <span class="how__step-num" aria-label="Paso 3">03</span>
          <span class="how__step-icon" aria-hidden="true">
            <!-- Marcador de ubicación -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
                 width="22" height="22">
              <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </span>
        </div>
        <h3 class="how__step-title">Guardá tus ciudades</h3>
        <p class="how__step-desc">
          Iniciá sesión y organizá tus destinos personales.
        </p>
      </div>

    </div>
  </div>
</section>
